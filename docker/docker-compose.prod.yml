version: "3.8"

# LL5 Production Docker Compose for Coolify
# Infrastructure (ES + PG) + Application services (MCPs + Gateway)
#
# Environment variables are injected by Coolify per-service.
# This file uses ${VAR} syntax — Coolify resolves them from service env config.

networks:
  ll5-net:
    driver: bridge

volumes:
  es-data:
  pg-data:

services:
  # =========================================================================
  # Infrastructure
  # =========================================================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: ll5-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms1g -Xmx1g}
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - ll5-net
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: ll5-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ll5}
      POSTGRES_USER: ${POSTGRES_USER:-ll5}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - ll5-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ll5}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Application Services
  # =========================================================================

  personal-knowledge:
    image: ghcr.io/arnonzamir/ll5-personal-knowledge:${IMAGE_TAG:-latest}
    container_name: ll5-personal-knowledge
    environment:
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_KEY: ${API_KEY:?API_KEY is required}
      USER_ID: ${USER_ID:?USER_ID is required}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    networks:
      - ll5-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ll5-knowledge.rule=Host(`mcp-knowledge.${DOMAIN}`)"
      - "traefik.http.routers.ll5-knowledge.tls=true"
      - "traefik.http.routers.ll5-knowledge.tls.certresolver=letsencrypt"
      - "traefik.http.services.ll5-knowledge.loadbalancer.server.port=3000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  gtd:
    image: ghcr.io/arnonzamir/ll5-gtd:${IMAGE_TAG:-latest}
    container_name: ll5-gtd
    environment:
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_KEY: ${API_KEY:?API_KEY is required}
      USER_ID: ${USER_ID:?USER_ID is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ll5}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ll5}
    networks:
      - ll5-net
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ll5-gtd.rule=Host(`mcp-gtd.${DOMAIN}`)"
      - "traefik.http.routers.ll5-gtd.tls=true"
      - "traefik.http.routers.ll5-gtd.tls.certresolver=letsencrypt"
      - "traefik.http.services.ll5-gtd.loadbalancer.server.port=3000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
