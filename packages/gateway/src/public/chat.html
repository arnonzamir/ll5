<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LL5 Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
  #login { max-width: 320px; margin: auto; padding: 24px; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  #login h2 { margin-bottom: 16px; color: #1a1a1a; text-align: center; }
  #login input { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  #login button { width: 100%; padding: 10px; background: #0066cc; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  #login button:hover { background: #0052a3; }
  #login .error { color: #cc0000; font-size: 13px; margin-bottom: 8px; display: none; }
  #chat-container { display: none; flex-direction: column; height: 100vh; }
  .header { padding: 12px 16px; background: #0066cc; color: #fff; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .header button { background: none; border: 1px solid rgba(255,255,255,0.5); color: #fff; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.4; word-wrap: break-word; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #0066cc; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #fff; color: #1a1a1a; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
  .msg .time { font-size: 11px; opacity: 0.7; margin-top: 4px; }
  .input-area { padding: 12px 16px; background: #fff; border-top: 1px solid #e0e0e0; display: flex; gap: 8px; }
  .input-area textarea { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; resize: none; max-height: 100px; font-family: inherit; }
  .input-area button { padding: 10px 20px; background: #0066cc; color: #fff; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; }
  .input-area button:disabled { background: #ccc; }
</style>
</head>
<body>

<div id="login">
  <h2>LL5 Chat</h2>
  <div class="error" id="login-error"></div>
  <input type="text" id="user-id" placeholder="User ID">
  <input type="password" id="pin" placeholder="PIN">
  <button onclick="doLogin()">Sign In</button>
</div>

<div id="chat-container">
  <div class="header">
    <span>LL5 Chat</span>
    <button onclick="newConversation()">New Chat</button>
  </div>
  <div id="messages"></div>
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const API = window.location.origin;
let token = localStorage.getItem('ll5_token') || '';
let convId = localStorage.getItem('ll5_conv_id') || '';
let lastTimestamp = '';
let seenIds = new Set();
let polling = null;

if (token) { showChat(); startPolling(); }

async function doLogin() {
  const userId = document.getElementById('user-id').value.trim();
  const pin = document.getElementById('pin').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!userId || !pin) { errEl.textContent = 'Enter user ID and PIN'; errEl.style.display = 'block'; return; }
  try {
    const res = await fetch(`${API}/auth/token`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, pin })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Login failed'; errEl.style.display = 'block'; return; }
    token = data.token;
    localStorage.setItem('ll5_token', token);
    showChat(); startPolling();
  } catch (e) { errEl.textContent = 'Connection error'; errEl.style.display = 'block'; }
}

function showChat() {
  document.getElementById('login').style.display = 'none';
  const c = document.getElementById('chat-container');
  c.style.display = 'flex';
  document.getElementById('input').focus();
  if (convId) loadHistory();
}

function newConversation() {
  convId = '';
  localStorage.removeItem('ll5_conv_id');
  lastTimestamp = '';
  document.getElementById('messages').innerHTML = '';
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  appendMsg('user', text, new Date().toISOString());
  try {
    const body = { channel: 'web', content: text };
    if (convId) body.conversation_id = convId;
    const res = await fetch(`${API}/chat/messages`, {
      method: 'POST', headers: authHeaders(), body: JSON.stringify(body)
    });
    if (res.status === 401) { handleAuthError(); return; }
    const data = await res.json();
    if (data.id) seenIds.add(data.id);
    if (!convId) { convId = data.conversation_id; localStorage.setItem('ll5_conv_id', convId); }
  } catch (e) { appendMsg('assistant', 'Failed to send message. Please try again.', new Date().toISOString()); }
}

async function loadHistory() {
  if (!convId) return;
  try {
    const res = await fetch(`${API}/chat/messages?conversation_id=${convId}&limit=100`, { headers: authHeaders() });
    if (res.status === 401) { handleAuthError(); return; }
    const data = await res.json();
    const el = document.getElementById('messages');
    el.innerHTML = '';
    seenIds.clear();
    for (const m of data.messages) {
      seenIds.add(m.id);
      appendMsg(m.role, m.content, m.created_at);
      lastTimestamp = m.created_at;
    }
  } catch (e) { /* ignore */ }
}

async function pollMessages() {
  if (!convId) return;
  const since = lastTimestamp ? `&since=${encodeURIComponent(lastTimestamp)}` : '';
  try {
    const res = await fetch(`${API}/chat/messages?conversation_id=${convId}${since}`, { headers: authHeaders() });
    if (res.status === 401) { handleAuthError(); return; }
    const data = await res.json();
    for (const m of data.messages) {
      if (seenIds.has(m.id)) continue;
      seenIds.add(m.id);
      if (m.role !== 'user' || m.direction === 'outbound') {
        appendMsg(m.role, m.content, m.created_at);
      }
      lastTimestamp = m.created_at;
    }
  } catch (e) { /* ignore */ }
}

function startPolling() { if (polling) clearInterval(polling); polling = setInterval(pollMessages, 3000); }

function appendMsg(role, content, ts) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const time = new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `${escapeHtml(content)}<div class="time">${time}</div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function authHeaders() { return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function handleAuthError() { token = ''; localStorage.removeItem('ll5_token'); location.reload(); }
</script>
</body>
</html>
